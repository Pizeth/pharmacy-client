<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Particle Navbar</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* 1. The main Navbar Container */
      .navbar {
        position: relative; /* Crucial: traps the absolute canvas inside */
        width: 100%;
        height: 100px;
        /* background-color: #0b3d91; Dark blue background */
        background: linear-gradient(45deg, rgb(187, 17, 17) 0%, #820000 100%);
        background: linear-gradient(45deg, #ff416c 0%, #ff4b2b 100%);
        background: linear-gradient(45deg, #190a05 0%, #870000 100%);
        display: flex;
        align-items: center;
        padding: 0 50px;
        box-sizing: border-box;
        overflow: hidden; /* Prevents particles from spilling out of the nav */
      }

      /* 2. The Canvas Background */
      #tsparticles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1; /* Pushes the canvas behind the text */
      }

      /* 3. The Actual Navbar Content */
      .nav-content {
        position: relative;
        z-index: 2; /* Brings text in front of the particles */
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        margin-left: 30px;
        font-weight: bold;
        transition: color 0.3s;
      }

      .nav-links a:hover {
        color: #00d2ff;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div id="tsparticles"></div>

      <div class="nav-content">
        <div class="logo"><h2>MyWebsite</h2></div>
        <div class="nav-links">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Services</a>
          <a href="#">Contact</a>
        </div>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <script>
      tsParticles.load("tsparticles", {
        particles: {
          number: {
            value: 60 /* Number of dots */,
          },
          color: {
            value: "#ffffff" /* Color of the dots */,
          },
          links: {
            enable: true,
            color: "#ffffff" /* Color of the connecting lines */,
            distance: 150 /* How close dots need to be to draw a line */,
            opacity: 0.4,
            width: 1,
          },
          move: {
            enable: true,
            speed: 1.5 /* Speed of the floating dots */,
          },
          size: {
            value: 2.5 /* Size of the dots */,
          },
        },
        interactivity: {
          events: {
            onHover: {
              enable: true,
              mode: "grab" /* Draws lines to your cursor when you hover */,
            },
          },
          modes: {
            grab: {
              distance: 180,
              links: { opacity: 0.8 },
            },
          },
        },
      });
    </script>
  </body>
</html>
