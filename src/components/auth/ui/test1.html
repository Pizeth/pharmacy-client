<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Particle Navbar</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #303030;
      }

      .middle {
        margin: 0;
        padding: 0;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 100%;
        text-align: center;
      }
      .social-btns {
        font-size: 0;
        text-align: center;
        float: right;
        padding: 0px;
      }
      .social-btns .btn,
      .social-btns .btn:before,
      .social-btns .btn .fab,
      .social-btns .btn .fas,
      .social-btns .btn .far {
        transition: all 0.35s;
        transition-timing-function: cubic-bezier(0.31, -0.105, 0.43, 1.59);
      }
      .social-btns .btn:before {
        top: 90%;
        left: -110%;
      }
      .social-btns .btn:focus:before,
      .social-btns .btn:hover:before {
        top: -10%;
        left: -10%;
      }
      .social-btns .btn {
        padding: 0px;
        border: none;
        font-size: inherit;
        display: inline-block;
        background-color: rgba(255, 255, 255, 0.75);
        width: 44px;
        height: 44px;
        line-height: 44px;
        margin: 10px 3px 10px 3px;
        text-align: center;
        position: relative;
        overflow: hidden;
        border-radius: 50%;
        box-shadow: 0px 3px 15px -3px rgba(255, 255, 255, 0.72);
        opacity: 0.99;
      }
      .social-btns .btn:before {
        content: "";
        width: 120%;
        height: 120%;
        position: absolute;
        -webkit-transform: rotate(45deg);
        transform: rotate(45deg);
      }
      .social-btns .btn .fab,
      .social-btns .btn .fas,
      .social-btns .btn .far {
        font-size: 20px;
        vertical-align: middle;
      }

      /* flickr */
      .social-btns .btn.flickr:before {
        background-color: #ff0084;
        background: linear-gradient(45deg, #0063dc 50%, #ff0084 50%);
      }
      .social-btns .btn.flickr .fab {
        color: #ff0084;
        background: -webkit-linear-gradient(to right, #0063dc 50%, #ff0084 50%);
        background: linear-gradient(to right, #0063dc 50%, #ff0084 50%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* instagram */
      .social-btns .btn.instagram:before {
        background: linear-gradient(
          rgb(64, 93, 230) 10%,
          rgb(88, 81, 219) 20%,
          rgb(131, 58, 180) 30%,
          rgb(193, 53, 132) 40%,
          rgb(225, 48, 108) 50%,
          rgb(253, 29, 29) 60%,
          rgb(245, 96, 64) 70%,
          rgb(247, 119, 55) 80%,
          rgb(252, 175, 69) 90%,
          rgb(255, 220, 128) 100%
        );
      }
      .social-btns .btn.instagram .fab {
        background: -webkit-linear-gradient(
          #405de6,
          #5851db,
          #833ab4,
          #c13584,
          #e1306c,
          #fd1d1d,
          #f56040,
          #f77737,
          #fcaf45,
          #ffdc80
        );
        background: linear-gradient(
          #405de6,
          #5851db,
          #833ab4,
          #c13584,
          #e1306c,
          #fd1d1d,
          #f56040,
          #f77737,
          #fcaf45,
          #ffdc80
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* ebay */
      .social-btns .btn.ebay:before {
        background-color: #0db7ed;
        background: linear-gradient(
          45deg,
          #e53238 40%,
          #0064d2 40%,
          #0064d2 50%,
          #f5af02 50%,
          #f5af02 60%,
          #86b817 60%
        );
      }
      .social-btns .btn.ebay .fab {
        color: #e53238;
        background: -webkit-linear-gradient(
          to right,
          #e53238 25%,
          #0064d2 25%,
          #0064d2 50%,
          #f5af02 50%,
          #f5af02 75%,
          #86b817 75%
        );
        background: linear-gradient(
          to right,
          #e53238 25%,
          #0064d2 25%,
          #0064d2 50%,
          #f5af02 50%,
          #f5af02 75%,
          #86b817 75%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* slack */
      .social-btns .btn.slack:before {
        background-color: #36c5f0;
        background-image:
          linear-gradient(
            45deg,
            #e01e5a 25%,
            transparent 25%,
            transparent 75%,
            #2eb67d 75%,
            #2eb67d
          ),
          linear-gradient(
            45deg,
            #2eb67d 25%,
            transparent 25%,
            transparent 75%,
            #e01e5a 75%,
            #e01e5a
          ),
          linear-gradient(
            -45deg,
            #ecb22e 25%,
            transparent 25%,
            transparent 75%,
            transparent 75%,
            transparent
          ),
          linear-gradient(
            -45deg,
            transparent 25%,
            transparent 25%,
            transparent 75%,
            #ecb22e 75%,
            #ecb22e
          );
        background-size: 52.8px 52.8px;
        background-position:
          0 0,
          26.4px 26.4px;
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
      .social-btns .btn.slack .fab {
        width: 20px;
        color: #e01563;
        background-color: #36c5f0;
        background-image:
          linear-gradient(
            45deg,
            #e01e5a 25%,
            transparent 25%,
            transparent 75%,
            #2eb67d 75%,
            #2eb67d
          ),
          linear-gradient(
            45deg,
            #2eb67d 25%,
            transparent 25%,
            transparent 75%,
            #e01e5a 75%,
            #e01e5a
          ),
          linear-gradient(
            -45deg,
            #ecb22e 25%,
            transparent 25%,
            transparent 75%,
            transparent 75%,
            transparent
          ),
          linear-gradient(
            -45deg,
            transparent 25%,
            transparent 25%,
            transparent 75%,
            #ecb22e 75%,
            #ecb22e
          );
        background-size: 20px 20px;
        background-position:
          0 0,
          10px 10px;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .social-btns .btn:focus .fab,
      .social-btns .btn:hover .fab,
      .social-btns .btn:focus .fas,
      .social-btns .btn:hover .fas,
      .social-btns .btn:focus .far,
      .social-btns .btn:hover .far {
        color: #fff;
        -webkit-transform: scale(1.25);
        transform: scale(1.25);
        outline: none;
        background: -webkit-linear-gradient(#fff, #fff);
        background: linear-gradient(#fff, #fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Microsoft */
      .social-btns .btn.microsoft:before {
        /*   background-color: #f25022; */
        background-image:
          linear-gradient(
            45deg,
            #00a4ef 25%,
            transparent 25%,
            transparent 75%,
            #7fba00 75%,
            #7fba00
          ),
          linear-gradient(
            45deg,
            #7fba00 25%,
            transparent 25%,
            transparent 75%,
            #00a4ef 75%,
            #00a4ef
          ),
          linear-gradient(
            -45deg,
            #ffb900 25%,
            transparent 25%,
            transparent 75%,
            #f25022 75%,
            #f25022
          ),
          linear-gradient(
            -45deg,
            #f25022 25%,
            transparent 25%,
            transparent 75%,
            #ffb900 75%,
            #ffb900
          );
        background-size: 52.8px 52.8px;
        background-position:
          0 0,
          26.4px 26.4px;
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
      .social-btns .btn.microsoft .fab {
        width: 20px;
        color: #e01563;
        /*   background-color: #f25022; */
        background-image:
          linear-gradient(
            45deg,
            #00a4ef 25%,
            transparent 25%,
            transparent 75%,
            #7fba00 75%,
            #7fba00
          ),
          linear-gradient(
            45deg,
            #7fba00 25%,
            transparent 25%,
            transparent 75%,
            #00a4ef 75%,
            #00a4ef
          ),
          linear-gradient(
            -45deg,
            #ffb900 25%,
            transparent 25%,
            transparent 75%,
            #f25022 75%,
            #f25022
          ),
          linear-gradient(
            -45deg,
            #f25022 25%,
            transparent 25%,
            transparent 75%,
            #ffb900 75%,
            #ffb900
          );
        background-size: 20px 20px;
        background-position:
          0 0,
          10px 10px;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .social-btns .btn:focus .fab,
      .social-btns .btn:hover .fab,
      .social-btns .btn:focus .fas,
      .social-btns .btn:hover .fas,
      .social-btns .btn:focus .far,
      .social-btns .btn:hover .far {
        color: #fff;
        -webkit-transform: scale(1.25);
        transform: scale(1.25);
        outline: none;
        background: -webkit-linear-gradient(#fff, #fff);
        background: linear-gradient(#fff, #fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body>
    <div class="social-btns col-12 middle">
      <a
        href="https://www.flickr.com/photos/razeth"
        target="_blank"
        rel="nofollow"
        title="Flickr"
        class="btn flickr"
      >
        <i class="fab fa-flickr" aria-hidden="true"></i>
      </a>
      <a
        href="https://www.instagram.com/razeth.boss/"
        target="_blank"
        rel="nofollow"
        title="Instagram"
        class="btn instagram"
      >
        <i class="fab fa-instagram" aria-hidden="true"></i>
      </a>
      <a
        href="https://www.ebay.com/usr/razeth"
        target="_blank"
        rel="nofollow"
        title="ebay"
        class="btn ebay"
      >
        <i class="fab fa-ebay" aria-hidden="true"></i>
      </a>
      <a
        href="https://join.slack.com/t/razeth/shared_invite/enQtNzI5Mjg0MjQ3NDk0LTI0ODcyYjA0ZjU4ZjI5NmY0MWIyOWY4ZGYzZjJhMzE0ODFjZDk2NWQyNGVjN2M2YjhmNTg5NTA5NDE5NzU2ZWQ"
        target="_blank"
        rel="nofollow"
        title="Slack"
        class="btn slack"
      >
        <i class="fab fa-slack" aria-hidden="true"></i>
      </a>
      <a
        href="#ejuy"
        target="_blank"
        rel="nofollow"
        title="microsoft"
        class="btn microsoft"
      >
        <i class="fab fa-microsoft" aria-hidden="true"></i>
      </a>
    </div>
  </body>
</html>
