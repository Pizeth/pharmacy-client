<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <head>
      <meta charset="UTF-8" />
      <meta http-equiv="X-UA-Compatible" content="IE=edge" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Colorfull Navbar</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          overflow: none;
        }

        body {
          background-color: #000;
        }

        nav {
          display: flex;
          justify-content: center;
          height: 50px;
          background-color: #000;
        }

        ul {
          list-style-type: none;
        }

        ul li {
          display: inline;
          float: left;
          margin: 0;
          padding: 0;
        }

        ul li a {
          display: inline-block;
          color: #fff;
          font-size: 16pt;
          text-decoration: none;
          text-align: center;
          padding: 12.7px 12.7px;
          box-sizing: border-box;
          height: 45px;
        }

        .home,
        .services,
        .products,
        .pricing,
        .team,
        .careers,
        .about,
        .contact {
          background-size: 100% 200%;
          transition: background-position 0.5s;
        }

        .home:hover,
        .services:hover,
        .products:hover,
        .pricing:hover,
        .team:hover,
        .careers:hover,
        .about:hover,
        .contact:hover {
          background-position: 0 100%;
          transition: all 0.25s ease-in;
        }

        .home {
          border-bottom: 5px solid orange;
          background-image: linear-gradient(to top, orange 50%, black 50%);
        }
        .home:hover {
          background-color: orange;
        }

        .services {
          border-bottom: 5px solid coral;
          background-image: linear-gradient(to top, coral 50%, black 50%);
        }
        .services:hover {
          background-color: coral;
        }

        .products {
          border-bottom: 5px solid #fe3e00;
          background-image: linear-gradient(to top, #fe3e00 50%, black 50%);
        }
        .products:hover {
          background-color: #fe3e00;
        }

        .pricing {
          border-bottom: 5px solid #922b3e;
          background-image: linear-gradient(to top, #922b3e 50%, black 50%);
        }
        .pricing:hover {
          background-color: #922b3e;
        }

        .team {
          border-bottom: 5px solid purple;
          background-image: linear-gradient(to top, purple 50%, black 50%);
        }
        .team:hover {
          background-color: purple;
        }
        .careers {
          border-bottom: 5px solid #1c1aaf;
          background-image: linear-gradient(to top, #1c1aaf 50%, black 50%);
        }
        .careers:hover {
          background-color: #1c1aaf;
        }

        .about {
          border-bottom: 5px solid #0066e7;
          background-image: linear-gradient(to top, #0066e7 50%, black 50%);
        }
        .about:hover {
          background-color: #0066e7;
        }
        .contact {
          border-bottom: 5px solid #0a8062;
          background-image: linear-gradient(to top, #0a8062 50%, black 50%);
        }
        .contact:hover {
          background-color: #0a8062;
        }

        .content {
          display: flex;
          justify-content: center;
          flex-direction: column;
          margin: 0 auto;
          width: 880px;
          height: 685px;
          margin-top: 50px;
        }
        h1 {
          background-image: linear-gradient(
            to right,
            orange,
            #fe3e00,
            #922b3e,
            purple,
            #1c1aaf,
            #0066e7,
            #0a8062
          );
          color: white;
          text-align: center;
          font-size: 3.8em;
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }

        p {
          text-align: center;
          -webkit-background-clip: text;
          background-clip: text;
          color: #fff;
          margin-top: 30px;
          font-size: 2em;
        }
      </style>
    </head>
    <body>
      <header>
        <nav>
          <ul>
            <li class="home"><a href="">Home</a></li>
            <li class="services"><a href="">Services</a></li>
            <li class="products"><a href="">Products</a></li>
            <li class="pricing"><a href="">Pricing</a></li>
            <li class="team"><a href="">Our Team</a></li>
            <li class="careers"><a href="">Careers</a></li>
            <li class="about"><a href="">About Us</a></li>
            <li class="contact"><a href="">Contact Us</a></li>
          </ul>
        </nav>
      </header>

      <div class="content">
        <h1>Colorfull Navigation bar</h1>
        <p>
          this is a cool and colorful navigation bar with a little bit of css
          animation
        </p>
      </div>
    </body>
  </body>
</html>
